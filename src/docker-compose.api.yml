version: '3.8'

services:
  fcg-ms-payments-api:
    build:
      context: .
      dockerfile: FCG_MS_Payments.Api/Dockerfile
    container_name: fcg-ms-payments-api
    ports:
      - "5000:80"
      - "5001:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80;https://+:443
      - StripeSettings__SecretKey=sk_test_mock_key
      - StripeSettings__PublishableKey=pk_test_mock_key
      - StripeSettings__MockServerUrl=http://host.docker.internal:12111
      - JwtSettings__SecretKey=your-super-secret-key-with-at-least-32-characters
    volumes:
      - ./FCG_MS_Payments.Api/appsettings.Development.json:/app/appsettings.Development.json:ro
    depends_on:
      - stripe-mock
    networks:
      - api-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  stripe-mock:
    image: stripemock/stripe-mock:latest
    container_name: stripe-mock
    ports:
      - "12111:12111"
    environment:
      - STRIPE_MOCK_PORT=12111
      - STRIPE_MOCK_HTTP_PORT=12111
    command: >
      --http-port 12111
      --https-port 12112
      --fixtures /etc/stripe-mock/fixtures.json
    volumes:
      - ../../stripe-mock/fixtures.json:/etc/stripe-mock/fixtures.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:12111/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - api-network

networks:
  api-network:
    driver: bridge 